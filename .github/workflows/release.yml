name: Build & Publish NPM Package

on:
  push:
    tags:
      - 'v*.*.*' # prod releases, e.g. v1.2.3
      - 'v*.*.*-dev.*' # dev releases, e.g. v1.2.3-dev.4

permissions:
  id-token: write # Required for OIDC (Trusted Publishers)
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish dev tag to npm
        if: contains(github.ref_name, '-dev.')
        run: npm publish --tag dev

      - name: Publish latest to npm
        if: ${{ !contains(github.ref_name, '-dev.') }}
        run: npm publish

      - name: Summary
        if: success()
        run: |
          echo "## Published ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **npm dist-tag:** \`${{ contains(github.ref_name, '-dev.') && 'dev' || 'latest' }}\`" >> $GITHUB_STEP_SUMMARY
